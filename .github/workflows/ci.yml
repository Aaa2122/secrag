name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: secrag
          POSTGRES_PASSWORD: secrag
          POSTGRES_DB: secrag
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U secrag -d secrag"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run alembic upgrade head
      - run: uv run pytest -q
      # Evals gate: merges are blocked if the latest committed eval runs
      # regress below evals/thresholds.json.
      - run: uv run python -m secrag.evals.gate
