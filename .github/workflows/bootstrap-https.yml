name: bootstrap-https

on:
  pull_request:
    branches: [main]

jobs:
  deploy:
    if: github.head_ref == 'codex/https-domain'
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Caddy reverse proxy
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new \
            ubuntu@145.239.196.98 \
            'set -eu
             curl -fsS http://127.0.0.1:8000/health >/dev/null
             sudo -n install -d -m 755 /opt/secrag-caddy
             echo c2VjcmFnLjE0NS4yMzkuMTk2Ljk4LnNzbGlwLmlvIHsKICAgIHJldmVyc2VfcHJveHkgMTI3LjAuMC4xOjgwMDAKfQo= | base64 -d | sudo -n tee /opt/secrag-caddy/Caddyfile >/dev/null
             sudo -n docker rm -f secrag-caddy 2>/dev/null || true
             sudo -n docker run -d --name secrag-caddy --restart unless-stopped --network host \
               -v /opt/secrag-caddy/Caddyfile:/etc/caddy/Caddyfile:ro \
               -v secrag_caddy_data:/data \
               -v secrag_caddy_config:/config \
               caddy:2-alpine'

      - name: Verify HTTPS
        run: |
          curl --fail --show-error --silent \
            --retry 12 --retry-delay 5 --retry-all-errors \
            https://secrag.145.239.196.98.sslip.io/health
